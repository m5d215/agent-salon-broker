name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          staging="agent-salon-broker-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/release/agent-salon-broker "$staging/"
          cp LICENSE README.md "$staging/"
          tar czf "${staging}.tar.gz" -C "$staging" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-salon-broker-${{ matrix.target }}
          path: agent-salon-broker-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" --generate-notes agent-salon-broker-*.tar.gz

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: m5d215/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Bump formula
        working-directory: homebrew-tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          formula="Formula/agent-salon-broker.rb"

          sed -i -E "s|version \"[^\"]+\"|version \"${version}\"|" "$formula"

          # 各プラットフォームの url 行と直後の sha256 行をペアで更新。
          # sed の N で次行を pattern space に追加してから一括置換する。
          for target in macos-arm64 linux-x86_64; do
            sha=$(shasum -a 256 "../agent-salon-broker-${target}.tar.gz" | cut -d' ' -f1)
            sed -i -E "/-${target}\.tar\.gz\"$/{
              N
              s|download/v[0-9.]+/|download/${TAG}/|
              s|sha256 \"[a-f0-9]+\"|sha256 \"${sha}\"|
            }" "$formula"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$formula"
          if git diff --cached --quiet; then
            echo "formula already at ${TAG}; skipping commit"
            exit 0
          fi
          git commit -m "agent-salon-broker: bump to ${TAG}"
          git push
